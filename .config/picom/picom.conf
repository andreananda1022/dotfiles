#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;


#################################
#            Blur               #
#################################

blur-method = "dual_kawase";
blur-strength = 3;


#################################
#       General Settings        #
#################################

backend = "glx";
dithered-present = false;
vsync = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
